<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Everstandard Bank</title>
    <script>
      // Mitigation for "Cannot set property fetch of #<Window> which has only a getter"
      // This error occurs when a library tries to overwrite window.fetch in a restricted environment.
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Prevented overwrite of read-only fetch');
              // Some libraries expect to be able to wrap fetch. 
              // We can't let them overwrite the property, but we can try to keep the original.
            }
          });
        } catch (e) {
          // If defineProperty fails, we try to at least keep the original fetch accessible
          if (window.fetch !== originalFetch) {
            try { window.fetch = originalFetch; } catch (i) {}
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
